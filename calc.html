<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>웹 계산기</title>
    <style>
        .calculator { 
            width: 260px; 
            margin: 50px auto; 
            border: 1px solid #ccc; 
            padding: 15px; 
            border-radius: 8px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            background-color: #fff;
        }
        #display { 
            width: 100%; 
            height: 50px; 
            margin-bottom: 15px; 
            text-align: right; 
            font-size: 24px; 
            box-sizing: border-box; 
            padding: 5px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #f9f9f9;
        }
        .buttons { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 8px; 
        }
        button { 
            padding: 15px; 
            font-size: 18px; 
            cursor: pointer; 
            border: none; 
            background-color: #e0e0e0; 
            border-radius: 4px; 
            transition: 0.2s;
        }
        button:hover { background-color: #d0d0d0; }
        .operator { background-color: #ff9800; color: white; }
        .operator:hover { background-color: #e68a00; }
        .equal { grid-row: span 2; background-color: #4CAF50; color: white; }
        .equal:hover { background-color: #45a049; }
        .zero { grid-column: span 2; }
    </style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" disabled>
    <div class="buttons">
        <button onclick="clearDisplay()">C</button>
        <button onclick="deleteLast()">←</button>
        <button onclick="appendValue('/')" class="operator">/</button>
        <button onclick="appendValue('*')" class="operator">*</button>
        
        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button onclick="appendValue('-')" class="operator">-</button>
        
        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button onclick="appendValue('+')" class="operator">+</button>
        
        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button onclick="calculate()" class="equal">=</button>
        
        <button onclick="appendValue('0')" class="zero">0</button>
        <button onclick="appendValue('.')">.</button>
    </div>
</div>

<script>
    const display = document.getElementById('display');

    // 화면에 숫자 및 연산자 추가
    function appendValue(value) {
        display.value += value;
    }

    // 화면 초기화 (C)
    function clearDisplay() {
        display.value = '';
    }

    // 한 글자 지우기 (←)
    function deleteLast() {
        display.value = display.value.slice(0, -1);
    }

    // 계산 실행 (=)
    function calculate() {
        try {
            // eval을 사용하여 문자열 수식 계산
            display.value = eval(display.value);
        } catch (error) {
            display.value = '오류';
            setTimeout(clearDisplay, 1500);
        }
    }
</script>

</body>
</html>
