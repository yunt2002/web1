<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>소프트웨어 기술 선호에 관한 설문</title>
    <link href="survey4.css" type="text/css" rel="stylesheet">
</head>
<body>
    <header>
        <h1>설문지</h1>
        <p>소프트웨어 기술에 대한 의견을 듣습니다. 많은 참여 부탁드립니다.</p>
    </header>
    
    <hr>
    
    <div class="form-box">
        <form>
            <div class="row">
                <span class="title">학년</span>
                <label><input type="radio" name="grade" value="1" checked> 1학년</label>
                <label><input type="radio" name="grade" value="2"> 2학년</label>
                <label><input type="radio" name="grade" value="3"> 3학년</label>
                <label><input type="radio" name="grade" value="4"> 4학년</label>
            </div>
            
            <div class="row">
                <span class="title">성별</span>
                <label><input type="radio" name="gender" value="m"> 남</label>
                <label><input type="radio" name="gender" value="f" checked> 여</label>
            </div>
            
            <div class="row">
                <span class="title">관심 분야</span>
                <select name="interest">
                    <option value="mobile">모바일 소프트웨어</option>
                    <option value="web">웹 프로그래밍</option>
                    <option value="ai">인공지능</option>
                </select>
            </div>
            
            <div class="row">
                <span class="title">진로(다중 선택)</span>
                <label><input type="checkbox" name="career" value="dev" checked> 개발</label>
                <label><input type="checkbox" name="career" value="plan"> 기획</label>
                <label><input type="checkbox" name="career" value="sales"> 영업</label>
                <label><input type="checkbox" name="career" value="startup"> 창업</label>
            </div>
            
            <div class="row">
                <span class="title message-title">남기고 싶은 말</span>
                <textarea rows="5" cols="35" placeholder="글을 남겨주세요"></textarea>
            </div>
        </form>
    </div>

    <footer>
        Copyright 2026 by Kitae
    </footer>
</body>
</html>
